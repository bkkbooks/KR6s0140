body:
  text: 勑編修別明聖代翻宣録中之六藏乘區別年代指明二之五二年四月譯成經五卷如意寶揔持王經一部一卷大乘經藏收佛在覩史多天宮說此中所明若人入此揔持門者即能解了一切諸法無來去相不生滅理空非空性乃至於此都無取著得佛知見等普賢曼拏羅經一部一卷大乘經藏祕密部收佛在王舍城鷲峯山說此中所明佛以慈悲普為現在當來修行者說若欲入金剛界大曼拏羅修習普賢法者先依勝處及請勝師淨心結界灌頂作壇想曼拏羅中有本尊獻五供養誦百八名等持明藏八大揔持王經一部一卷大乘經藏祕密部收析出別譯一時佛為末世衆生作利益故乃至普令所求成就即說八大揔持神呪過去諸佛同宣我今復說除八種怖畏成八種吉祥苦惱消除福慧具足滅畜生報轉生人天依法誦持所作成就尊勝大明王經一部一卷大乘經藏祕密部收析出別譯時佛世尊謂阿難言尊勝大明乃是過去諸佛所宣我為衆生亦復顯說除害解冤滅邪消怖遠焰魔界獲勝吉祥最上意陀羅尼經一部一卷大乘經藏祕密部收佛在救鴿城牛頭精舍說此中所明過去之世有一比丘名曰傳教遇一神人為傳教比丘說此神呪降大力鬼滅不祥事消除病惱增長福德實最上難思之明呪矣上五部竝中天竺梵本所出右經三藏沙門施護譯沙門令遵筆受沙門智遜綴文沙門惠溫守巒道真慧超知則善祐歸省守遵證義戶部郎中張洎潤文殿頭高品楊繼詮供奉官張美監譯是月十五日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣施護等言臣等今譯就如意寶揔持王等經五部五卷神呪之力有感必通故曰如意寶祕印之光無幽不燭故曰持明藏曼拏羅揔攝五部最上意成就六通或居鷲嶺道場或處牛頭精舍高談見證之利得八吉祥深明宿住之因悟三解脫洪惟妙義大拯迷津爰屬昌朝克隆至教伏惟應運統天睿文英武大聖至明廣孝皇帝陛下握符御極執象臨人崇釋梵之真宗廣勛華之至化散花宣偈遠集於他方一雨潤生溥濟於羣品臣等從師籌室訪道寶方幸承天覆之仁獲暢海潮之響庶臻景福永奉皇圖前件新譯經謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以其經入藏頒行是年五月京師僧省才上新譯大方廣揔持寶光明經疏詔僧司集義學僧詳定僧司言省才所作疏義頗得經旨請附藏流行許之是年十月譯成經集一十七卷衆許摩訶帝經一部一十三卷小乘經藏收佛在迦毗羅城尼俱陀林中說第一卷明有諸釋衆白世尊言我佛過去何處所生何姓何族為我宣說佛勑目連為衆宣說目連奉教入三摩地觀察世尊過去世事如實了知乃為衆說先談劫初緣起所食地餅林藤自然粳米人心起貪爾時衆許立一平等多智之人名之為王即釋氏為王之始也第二卷明王種繼續釋姓因由說佛父王兄弟四人各生二子淨飯二子長名悉達又說始從覩史下降閻浮擇上姓王族選聖德賢母奏樂乘象降神入胎第三卷明言彼摩邪得吉祥夢淨飯王命相師占之又明菩薩住胎天龍守護夫人攀樹太子降生現諸瑞應七步生蓮阿私陀仙占相太子具三十二相定作輪王等事第四卷明提婆達多與太子角力射七鐵鼓穿七鐵豬父王置婇女嬪妃以相娛樂太子生厭求出世閒乃至游觀四門見四種相厭老病死起出家心又設城塹七重宮嬪六萬是時太子專伺踰城第五卷明王自守護嚴密非常時淨飯王邪輸夫人各得異夢復請太子為占所夢於是太子正念無常唯思修道梵釋勸請䬸那馭馬有四天人來捧馬足夜出王城入山修道䬸那却將寶馬寶冠歸還王宮太子遂以寶劒自斷其髮脫珍妙服換獵人衣乃至入鷲峯山化仙人等第六卷明太子入山於仙人處學禪定等父王思念勑五百人往伴太子太子悉遣令回唯留親族三人外族二人林野修定食麻麥等修行求證入河沐浴受食乳糜詣金剛座成等正覺將近於座先現徵祥帝釋取草敷於座上佛既坐已魔王嬈亂佛皆降伏父王知佛已成正覺嚴治道路燒香設樂四門施寶第七卷明梵天來下請佛說法商人獻供四王奉鉢佛皆受已為彼商人說三歸法又往龍宮安禪七日出定說偈還金剛座七日觀察十二因緣流轉還滅次又思度所事二仙天言已終又思五仙應可受教遂往鹿苑三轉四諦為其化度由是諸天相報來下供養於佛第八卷明化五人已次化邪舍長者并其父母各得果證又化俱梨迦四子出家成阿羅漢乃至化賢者六十人等第九卷明往西曩野你聚落化難那舍并獻粥童女往連河岸化三百歲烏嚕尾螺迦葉并衆五百佛現神變降毒火龍迦葉受化并衆出家等第十卷明化曩提誐邪二迦葉并其徒衆既從化已皆成苾芻佛將三迦葉等千苾芻衆往誐邪山頂為諸苾芻說三種事時三迦葉并其徒衆聞法開悟成阿羅漢時民彌娑囉王遣使詣山請佛入宮申供養已佛乃為王并千羅漢演說四諦及緣生法第十一卷明佛為民彌娑囉王宣說無常苦空等法王及八萬天人并諸士庶遠塵離垢得法眼淨又說此王及三迦葉往昔因緣今得遇佛時王施園造寺奉佛復有長者請佛及僧家中供養給孤長者因以事緣到王舍城聞佛出世發心請佛歸於本國擇地造寺申供養等第十二卷明佛既受請勑舍利弗先往營造彼國外道欲舍利弗相與論義建大論場外道義墮悉皆降伏尊者為彼如應說法各各出家咸得果證又為國人廣說正法給孤買園造立精舍莊嚴既訖迎請世尊於是千阿羅漢帝釋梵王從佛而往佛既到已立精舍名舍衛國主勝軍大王值佛聞法發歡喜心佛化已畢思還本國省覲父王佛到父國與王相見建立精舍等第十三卷明父王見已迎佛入宮問答說偈却請世尊歸於精舍到精舍已普為大衆說四諦法時彼釋衆七十七千人皆證初果又度斛飯王甘露飯王及諸人天證四果等提婆達多毀謗於佛釋種童子說偈讚歎又勑目連令化父王滅我見想帝釋嚴設法會四王守門爾時世尊演說正法化其父王得證初果又說釋族賢王五百出家侍佛等揔彰此部經之大旨者由佛神力所加釋衆起念如來氏族本生云何佛勑目連宣本生事初彰目連神力宿住智明次顯如來正因道圓行滿乃至種種方便現化度生因其所說益廣增修若求菩提應如是學乃斯經之旨也布施經一部一卷大乘經藏收佛在舍衛國祇樹給孤獨園說此中所明為大苾芻說布施法三十七種與舍衛王說二利施以四無量心而修施行獲無𦊱礙證寂滅樂也月光菩薩經一部一卷大乘經藏收佛在王舍城竹林精舍說此中所明舍利弗及大目乾連於佛之先入般涅槃乃說釋迦因地為月光天子遍施一切發菩提心令所化者得證寂滅究竟彼岸金光王童子經一部一卷小乘經藏收佛在迦毗羅城你也誐嚕䭾林精舍說此中所明金光王童子詣於佛所思念何緣作何福利生於王宮受大福報童子讚佛殊勝功德廣大福田時佛為說十二因緣及四聖諦童子聞法證阿羅漢犍稚梵讚一部一卷西方聖賢集收上五部竝中天竺梵本所出右經集三藏沙門法賢譯法天證梵義施護證梵文沙門清沼令遵筆受沙門智遜慧達綴文沙門惠溫守巒慧超知則守遵皓丕雲勝證義戶部郎中張洎潤文殿頭高品楊繼詮供奉官張美監譯是月三日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣法賢等言臣等今譯就衆許摩訶帝等經五部一十七卷皆能仁在世真語利生舍衛城中唱四諦而聲聞獲益俱陀林下提十地而菩薩當機或果上談因或禪中現瑞或顯揚於聖族或開導于迷塗真俗互陳空有雙照四德備具一雨溥滋慶逢至聖之朝覩此難思之教伏惟應運統天睿文英武大聖至明廣孝皇帝陛下膺乾撫運體道御邦上奉三無合覆載照臨之德下安萬有推生成教道之仁眷甘露之法門思醍醐之正味重興翻譯務廣流通臣等早乏多聞叨依像法傳鷲峯之祕奧愧匪通才祝鳳曆之延鴻唯𧆛精懇前件新譯經集謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以經集入藏頒行并度本院童行十有一人為僧是年又詔梵學僧惟淨為譯經筆受以法賢上言先奉詔擇童子五十人攻習梵學惟淨初以童子中選太平興國九年十月度為僧其人每口授梵章則心通其義西域文字皆能曉晤故特從甄擢焉又詔曰朕端委中宸惠綏諸夏每欽崇於至教思誘導於羣迷惟竺土之淨區本能仁之闡化爰資通譯遂獲妙言因其慕嚮之誠式繼翻宣之盛西天譯經三藏朝散大夫試鴻臚少卿明教大師法賢傳教大師法天傳法大師施護等並金河名奈苑高流夙探了義之宗深樂同文之運而自遠趨帝闕光啓梵筵繼白馬之遐蹤暢青蓮之祕旨克揚妙諦列上契經疇其廣演之勞協我必誠之志屬親耕成禮鴻霈誕敷增祑卿曹優其命數是為朝獎以耀空門法賢可特授試光祿卿法天施護可竝特授試鴻臚卿餘如故翌日具表謝云臣法賢等言伏蒙聖恩特授臣法賢試光祿卿法天施護竝試鴻臚卿者天光下燭兌澤旁霑欣懼交并傍偟罔措臣等嘗詢典故竊訪官班謂卿也漢曰象河周稱惟月名崇九寺位亞三階苟非時髦莫膺寵授豈有擢從緇侶試此清資止如法果以道行授官不空以神通進爵斯皆釋門龍象覺苑棟梁而臣等學謝支謙名慙童壽貢梵編於金闕早契夙心翻妙義於玉華久叨殊獎中旨曲加於敦諭宸慈回借於發揮豈謂伏蒙應運統天睿文英武大聖至明廣孝皇帝陛下屬耕籍之藏儀布恩榮而及物假茲名器耀于法筵敢不臨履為懷精勤勵志共演雙林之法要以酬萬乘之鴻恩謹奉表稱謝以聞十月中僧行達寶基道初三人自天竺還以所得梵經八夾進獻上召見各賜紫衣束帛其後中國僧詣西域得梵經還者竝如之淳化元年十月譯成經集一十一卷七佛經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園說此中所明有苾芻衆思惟過去有佛出現族姓壽量而不能知時佛為說七佛世尊族姓壽量說法弟子等事末後世尊自說初生出家轉法輪之相欲令知佛族姓壽量起心修行而趣證也毗婆尸佛經一部二卷小乘經藏收析出別譯上卷所明滿度摩王有一太子名毗婆尸出城游觀見四種相厭苦出家出國游行夏安居已思惟十二緣生又觀色等五蘊生滅幻化乃得解脫下卷所明既成佛道度生說法有證羅漢那含果者此之大旨者說十二支及四諦法令所度生證四聖果誘導進修捨凡趣聖者也大三摩惹經一部一卷小乘經藏收佛在迦毗羅林說此中所明十方釋梵四大梵王各說偈頌佛為說法復有藥叉四天大王忉利天等童男童女皆來集會乃至魔聞說法歸依息惡此之大旨者人天集會演說法要有大威力能伏惡魔等也長者施報經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園說此中所明佛為給孤長者說布施法心有所求獲報不廣又說彌羅摩長者昔曾行施捨金銀寶妙衣輦輿不如以食施正見人由是廣申較量乃至最後給孤長者心得清淨悟寂滅忍上四部竝西天竺梵本所出毗沙門天王經一部一卷大乘經藏祕密部收佛在舍衛國祇樹給孤獨園說此中所明時毗沙門天王初夜放光來禮佛足說偈讚歎四方天王皆來禮佛各以威德護四大洲時毗沙門次說呪句若乾闥婆聞此神呪復作嬈亂一切有情者頭破七分如阿梨樹乃至廣陳呪句最後世尊讚歎此經有大威力此乃世尊威神加被天王令宣密言護持含識也聖曜母陀羅尼經一部一卷大乘經藏祕密部收佛在阿拏迦嚩帝大城說此中所明八部龍神九曜星宿人非人等佛為說法時金剛手菩薩天眼觀衆見諸宿曜惱害衆生請佛說法為作擁護佛於自心出大光明入宿曜頂乃說呪句復說聖曜母呪以作加持令諸衆生所願如意解憂經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園說此中所明初陳二偈次長行說凡夫迷著恩愛生憂今佛為說解憂之法令諸衆生學斷輪回如諸聲聞斷漏離憂出於三界也佛一百八名讚一部一卷文殊師利一百八名讚一部一卷聖觀自在菩薩梵讚一部一卷並西方聖賢集收上六部竝中天竺梵本所出右經集三藏沙門法天譯法賢證梵義施護證梵文沙門清沼令遵惟淨筆受沙門慧達綴文沙門惠溫守巒智遜慧超知則守遵歸省雲勝證義太僕少卿張洎潤文殿頭高品楊繼詮供奉官張美監譯是月三日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣法天等言臣等今譯就七佛等經讚共一十部一十一卷經旨宏深顯密交辨讚文奧妙華梵雙彰聖曜母之揔持化諸列宿毗沙門之祕印伏彼邪魔或示緣生或明施報或立安居之制或剪煩惱之根由旁設於化城冀同歸於覺苑慶斯法寶出自聖朝伏惟應運統天睿文英武大聖至明廣孝皇帝陛下道際淨居光超梵輔御金輪而化千界膺寶歷而接九皇浸惠澤於飛滿偃仁風於卉木而復凝神淨域索隱真筌譯鶴樹之遺音廣龍宮之祕藏洪惟妙教永贊丕圖適逢降聖之辰仰祝後天之壽前件新譯經集謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以經集入藏頒行并度本院童行十有一人為僧
