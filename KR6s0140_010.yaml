body:
  text: 別明聖代翻宣録中之九藏乘區別年代指明二之八佛三身讚等二合一卷佛三身讚曼殊室利菩薩吉祥伽陀並西方聖賢集收上三部並中天竺梵本所出右經集三藏沙門法賢譯法天證梵義施護證梵文沙門清沼惟淨智江致宗筆受沙門智遜綴文沙門仁守貞從志道文哲雲勝句端守贊道澄證義給事中楊礪潤文右監門衛率府率張美內供奉官楊繼詮監譯是月十九日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣法賢等言臣等今譯就大愛陀羅尼經等三部共三卷皆大雄開方便門示真實相教諸菩薩登十地之道階由菩薩依揔持王傳祕密印同乎調御也三祇之勝業吉祥大士悲苦趣以興言大愛上人現海神而陳化虛空藏之法炬燭彼幽塗無量壽之智輪攝諸生類讚三身之妙德彰二利之大勳允屬休明惟新演暢伏惟皇帝陛下欽膺駿命光纂丕圖執左契以臨人應飛輪而御極奉先思孝備罄於永懷臨下以寬用臻於至治百神孚祐三寶垂休真化冥符梵文遐至臣等仰承詔旨幸預翻傳式期莫大之良因上祝無疆之聖祚前件新譯經集謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以經集入藏頒行是年十一月譯成經一十卷延壽妙門陀羅尼經一部一卷大乘經藏祕密部收佛在摩伽陀國成正覺地聖金剛座大靈塔處普光明殿菩提道場説此中所明金剛手菩薩言此陀羅尼能與我及一切衆生善作擁護使彼惡魔伺不得便疾病中夭亦不能侵大吉祥陀羅尼寶賢陀羅尼二經合一卷大吉祥陀羅尼經大乘經藏祕密部收佛在蘇珂嚩帝佛剎説此中所明是陀羅尼有大功德若人記念獲大富貴一切部多皆來畏伏寶賢陀羅尼經大乘經藏祕密部收佛在舍衛國祇樹給孤獨園説是時有大夜叉主其名寶賢而白佛言我有祕密心陀羅尼若能持誦依法所作一切如意聖多羅菩薩經一部一卷大乘經藏祕密部收佛在香醉山五髻乾闥婆王宮説此中所明佛世尊於天人衆中如須彌山顯于大海是時五髻乾闥婆王言願佛世尊悲愍於我天人阿修羅等與作廣大利益安樂願為宣説多羅菩薩一百八名佛乃為説如是名號最後復説多羅菩薩陀羅尼等戒香經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園説此中所明佛謂阿難世間何香有風無風遍十方聞謂近事男及近事女持佛五戒不殺盜等如是五種淨戒之香有風無風遍十方聞一切聞者咸皆稱讚息除賊難陀羅尼經一部一卷大乘經藏祕密部收佛在摩伽陀國菴羅樹園側韋提呬山帝釋巖中説此中所明阿難一時忽見大惡盜賊之衆自遠而來即生怖畏因以白佛佛乃為説此陀羅尼能除一切賊難怖畏一切如來名號陀羅尼經一部一卷大乘經藏祕密部收佛在摩伽陀國法野大菩提道場中説此中所明觀自在菩薩一時白佛我有一切如來名號陀羅尼是陀羅尼過去莊嚴現在賢善未來星宿三劫千佛同共宣説佛勑許宣時觀自在菩薩先説如來諸名號已次説祕密陀羅尼句觀自在菩薩母陀羅尼經一部一卷大乘經藏祕密部收佛在廣嚴城説此中所明普賢菩薩白佛言世尊我有觀自在菩薩母陀羅尼大明章句佛勑許宣普賢乃説如是祕密微妙呪句即菩薩母若有受持讀誦之者罪業消除一切所求皆得成就祕密八名陀羅尼經一部一卷大乘經藏祕密部收佛在舍衛國祇樹給孤獨園説此中所明佛謂金剛手言我今於汝金剛部中略説汝之祕密八名及陀羅尼若持誦者退散魔怨於諸所求不難而成上八部並中天竺梵本所出大正句王經一部二卷小乘經藏收一時迦葉童子在憍薩羅國尸利沙大城之北尸利沙林鹿野園中説上卷所明是時有王名大正句都彼大城每作是言無有來世亦無有人復無化生起斯異見乃問迦葉迦葉為王廣宣其事設以喻況顯斯義旨以善方便使令開悟下卷所明迦葉告王勿更有喻證彼無人無後世邪王言有喻可證此理最後乃至其王受化心開意解向佛投誠受三自歸永持五戒上一部西天竺梵本所出右經三藏沙門法賢譯法天證梵義施護證梵文沙門清沼惟淨智江致宗筆受沙門智遜道澄綴文沙門仁徹守貞從志道文懷哲雲勝句端守贊證義翰林學士給事中楊礪潤文殿頭高品鄭守鈞監譯是月二十三日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣法賢等言臣等今譯就延壽妙門陀羅尼等經九部共一十卷皆如來起後得智説如實言應機而立三乘詣理而歸一揆菴羅樹下演奧密之靈筌鹿野苑間示人天之妙利或止香醉山裏或處菩提場中踞解脫牀現㧾持印見聞生信皆得吉祥教授利他速獲悉地傳流所及翻演惟新恭惟皇帝陛下德總妙嚴道躋梵輔行清淨化修菩提於三十四心住常樂門承記別於百千萬劫欽承先旨宣暢祕文廣闡譯筵奉揚真教臣等叨膺明詔同演契經敢因樞電之降祥仰祝河沙之算福前件新譯經謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以其經入藏頒行又法賢法天施護並詔加朝奉大夫仍度本院童行十有一人為僧十二月泥波羅國僧羅護羅獻梵經二十六夾咸平元年七月譯成經七卷頻婆娑羅王經一部一卷小乘經藏收佛在王舍城杖林山中靈塔處説此中所明頻婆娑羅王與諸臣佐同詣佛所伸禮奉巳時有婆羅門等作是念言優樓頻螺迦葉壽三百歲領徒五百投佛出家而世尊者方成正覺師少資老遂起疑心佛知其意令彼迦葉現十八變還復本座佛為衆説五蘊生滅涅槃寂靜衆聞法已各得果利頻婆娑羅王亦獲勝益於佛法中得無所畏舊城喻經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園説此中所明佛為苾芻宣説往昔未證果時觀十二支逆推老死因生支有乃至行支因無明有返觀還滅亦復如是既居果位返念因時如人履其舊道達舊都城如來今日到涅槃城嚴麗如故返照其源法無差別人仙經一部一卷小乘經藏收佛在那提迦城昆左迦精舍説此中所明阿難問佛頻婆娑羅王及彼城中諸優婆塞此滅彼生行願果報世尊因為示相觀察又以神通使空聲曰我是人仙因此向佛次第宣説頻婆娑羅王及彼八萬諸優婆塞由信佛法證須陀洹又説梵王變現神通因四神足説四念處及八正道皆言如來悉知悉見令諸衆生咸得清淨信佛功德經一部一卷小乘經藏收佛在阿拏迦城菴羅園説此中所明因舍利弗欲説如來功德等事佛讚許説此所説者正顯如來能説廣大最勝妙法若善不善及諸緣生等又舍利弗説或修一法或滅一法或證一法及説七種人法證四果法悉為顯諸外道不信於佛明舍利弗深生信奉信解智力經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園説此中所明佛為苾芻説信解力此法即是真如之理唯佛能知謂佛所有五力十力於是法中實知實證是能了知佛無上處作師子吼轉妙法輪作是説者意令苾芻如理修學故也善樂長者經一部一卷大乘經藏祕密部收佛在迦毗羅城説此中所明善樂長者了達四諦信向三寶忽於一時不見色像遙向世尊歸依發願佛勑阿難持呪往彼為作救護是時長者以呪力故即能觀照還復如故上六部並中天竺語龜茲國書法身經一部一卷大乘經藏收析出別譯此中所明廣顯佛之法身功德及説化身種種勝用若有求成正等覺智諸苾芻等應當如理如實了知隨所了知如理應修等上一部中天竺梵本所出右經三藏沙門法賢譯法天證梵義施護證梵文沙門清沼惟淨智江致宗筆受沙門智遜道澄綴文沙門仁徹守貞從志道文雲勝懷哲句端守贊證義翰林學士給事中楊礪潤文殿頭高品鄭守鈞監譯是月十一日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣法賢等言臣等今譯就頻婆娑羅王等經七部共七卷教分于半字滿字理契于大根小根或支流別行或隨方設化昆左迦舍現神足通給孤獨園作師子吼三脫門之顯敞豈間賢愚八正道之坦夷寧容瓦礫彰人仙之宿住示長者之本因金口親宣玉華載譯伏惟皇帝陛下纂承聖業茂建鴻徽欽奉大雄闡揚真法洞三空之奧邃究七覺之幽微臣等學謝安清道慙支讖今以中元屆節妙義初翻冀憑覺地之因永福後天之祚前件新譯經謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以其經入藏頒行是年四月北天竺僧迦蘭拏扇底獻梵經三十一夾五月北天竺僧如來吉祥獻梵經一夾并觀音銅像一軀是年十一月譯成經律七卷最上祕密那拏天經一部三卷大乘經藏祕密部收揔有九分佛在毗沙門宮為大衆説上卷所明成就儀軌因毗沙門勸請説法佛從面門出七色光入那拏天頂時那拏天説心大明令人持誦所求成就中卷所明欲求聖藥或欲調伏諸惡夜叉設咄嚕等皆得隨意又令依法畫曼拏羅及那拏天像前持誦作諸成就皆悉如意下卷所明修花燈塗用獻供養結諸印相持誦大明欲作護摩及諸敬愛依法施作所欲皆成揔彰此部經之大旨者顯佛世尊為利益故詣毗沙門宮攝伏部多制諸惡者放光表瑞受請應機復欲彰其那拏天力得大自在具大威神説自心明而為降伏以伏惡故增益法成自得敬愛由此普能成就諸法入修羅宮出地伏藏聖劒聖藥八法皆成故知大覺權方設降伏之軌範真乘祕要彰悉地之功能悲智相應印明融貫攝用歸體同入真常彼那拏天即菩提智斯乃祕密深旨者也帝釋所問經一部一卷小乘經藏收佛在摩伽陀國王舍城東帝釋巖中為帝釋説此中所明帝釋天主問煩惱因求出離法佛説煩惱憎愛為因由憎愛故起諸過失令斷染因修諸淨行帝釋聞法遠塵離垢得法眼淨決定義經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園為苾芻説此中所明謂蘊處界緣生四諦二十二根佛十力等決定名義顯佛所説決定正法純一無雜清淨圓滿上三部並中天竺梵本所出四品法門經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園為阿難説此經凡有四名一名四品法門二名法鏡三名甘露鼓四名多界意明衆生愚迷不了四法謂界處緣起處非處法不善了故迷於正理不能斷苦而求解脫世尊為説令其修斷趣證聖果等解夏經一部一卷小乘律藏收佛在王舍城迦蘭陀竹林精舍為苾芻説此中所明解夏法式若自有罪恣他舉陳佛與苾芻無諸過失互相忍可三業清淨上二部本中天竺語龜茲國書右經律三藏沙門法賢譯法天證梵義施護證梵文沙門清沼惟淨智江致宗筆受沙門智遜仁徹綴文沙門守貞從志道文雲勝懷哲句端守贊道一證義樞密副使工部侍郎楊礪潤文殿頭高品鄭守鈞監譯是月十九日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣法賢等言臣等今譯就最上祕密那拏天等經律五部七卷雷音爰震道種方萌由機感之多門乃權實之殊致或處蓮華藏彰祕密之神功或現甘露王明決擇之真要菴羅巖窟演四諦之法輪迦蘭竹林制九旬之儀皆令解脫咸趣菩提示鑿井而必使見源設化城而當期獲寶允鍾昌運廣達真風伏惟皇帝陛下道際釋天明齊佛日握符御極膺三葉之寶圖灌頂臨軒備二嚴之妙相而復深窮至理旁闡真乘梵簡繼臻法音彌震臣等共偱凡識恭譯聖言欽成命以增憂仰昔賢而懷愧幸逢聖節同罄臣誠庶資華藏之祕筌以致椿齡之善頌前件新譯經律謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以經律入藏頒行是年詔賜梵學僧智江號宣密大師致宗號揔持大師本院童行十有一人悉度為僧
