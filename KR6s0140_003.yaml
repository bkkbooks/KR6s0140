body:
  text: 趙安仁翰林學士楊億等奉勑編修別明聖代翻宣録中之二藏乘區別年代指明二之一天竺皇設教正覺垂言本一事之大緣應萬行之殊品譬夫雨滋衆卉寧分甘苦之差空極無垠豈有方圓之限故原其教也或分三藏隨其機也或開二乘止如始自鹿園終乎鶴樹依時依處契理契根盡四含九部之極談窮六度一真之妙義通即十二分別即唯契經斯經藏也又若軌範四衆調伏諸根使威儀之可觀令持犯之有則或明七聚或説五篇其守護焉萬善原斯而起其破毀也衆惡自茲而興制貪染心成清淨行斯律藏也又復研核性相明辨正邪詮慧學之楷摸挫異宗之軌轍或建立於教藏或解釋於佛經若奢薩怛羅之名若摩怛里迦之稱斯論藏也若夫滿字圓音牛車上喻極二利三空之道窮一乘萬行之源應上品機緣在菩提薩埵斯大乘也又教稱半字喻指化城窮四諦之理源盡三界之苦本隨此機性設以化門斯小乘也然妙典流通存諸付囑皇朝翻譯當紀歲年故此指明庶彰事實今序皇朝所譯大小乘經律論等以奏進年月為次列之于左大乘經一百四十部二百九十卷大乘律一部一卷大乘論一十一部一十九卷小乘經四十四部六十九卷小乘律五部五卷小乘論見闕西方聖賢集傳梵本翻譯者二十一部二十九卷太平興國七年七月譯成經三卷聖佛母小字般若波羅蜜多經一部一卷三藏沙門天息災譯大乘經藏祕密部收佛在王舍城鷲峯山為聖觀自在菩薩説此中所明以陀羅尼即般若波羅蜜多由此出生諸佛菩薩及一切法法從勝用故稱佛母令受持者近招福樂遠趣佛乘大乘聖吉祥持世陀羅尼經一部一卷三藏沙門法天譯大乘經藏祕密部收佛在憍睒彌國大𣗥林中為妙月長者等説此中所明顯祕密言有殊勝力聞持讀誦見招富樂之世財解釋宣通當感吉祥之勝福因妙月之請問命阿難以證成持益世財故名持世無能勝幡王如來莊嚴陀羅尼經一部一卷三藏沙門施護譯大乘經藏祕密部收佛在忉利天帝釋宮中為帝釋説此中所明無能勝陀羅尼不可思議功莫大焉凡受持者戰陳得勝讀誦者所作皆成右經三部三卷並中天竺梵本所出沙門常謹法進筆受兼綴文光祿卿湯悅兵部員外郎張洎潤文殿直劉素監譯其經是月十二日具表上進其詞曰臣天息災等言臣等奉承明詔俾譯梵文慶及空門榮生覺苑臣天息災等誠歡誠抃頓首頓首伏以如來以四智起用而經典乃生沙門以十等掄材而翻譯為首苟非博通內外洞達古今繼淨業於四依契深因於五密即何以發揮真典宣暢徽猷副聖皇崇尚之心揚善逝威神之化臣等道慙秦什學謝竺生乍列象筵思道安五失之誡載詳貝簡非彥悰八備之才幸遭盛時慮玷成命伏惟應運統天睿文英武大聖至明廣孝皇帝陛下因嚴百福化被四洲乘象運以臨人應賢劫而御世躋蒸黎於壽域攝動植於慈門德叶無為化孚有截而乃欽承佛記冥契頓機將欲廣龍藏之真文演牛車之了義宏開譯館遠集緇流潤色金言丹青玉諜昭然盛美耀于釋天臣等今者譯就聖佛母小字般若波羅蜜多經大乘聖吉祥持世陀羅尼經無能勝幡王如來莊嚴陀羅尼經等三部各一卷是三經者皆屬上乘般囉若者智慧之對翻陀羅尼者揔持之詮理以出生諸法目之為母能成就萬行尊之為王即色明空空非斷滅攝相歸性性本真常由含識之覺源即如來之法印聞持生信果利有歸庶憑了義之勝緣上助無疆之景祚前件新譯經謹繕寫上進以聞太宗留於禁中翌日詔左右街僧司選京城義學僧一百人同加詳定於是左街僧録神曜等及諸義學僧咸以為譯場久廢傳演至難講求單重之梵章研核三五之法印時義學僧執所譯經天息災等持其梵本華梵對釋義理昭然由是神曜等及義學僧百人列表上言稱今之所翻與古譯合續下詔入藏流行是月十有四日太宗皇帝臨幸譯筵親加慰諭命天息災等坐賜茶仍出縑帛及受用物等面賜之又詔度本院童行一十人為僧仍命使臣以院之東西堂各建殿宇東安佛像西置經藏詔令遍閲梵夾凡經律論取今大藏目録校定其未有者翻譯以進已有者更不重譯仍盡以禁中所有梵夾付院天息災等即以梵夾編列經律論及密教讚頌等次第翻譯又詔鳳翔梵學沙門建盛充筆受京師義學沙門慧達可瓌善祐法雲智遜惠溫守巒道真置顯慧超等十人充證義自是釋門之選咸重譯筵俄又賜大藏經以備檢閲名題八年三月譯成經四卷大乘莊嚴寶王經一部四卷大乘經藏祕密部收佛在舍衛國祇樹給孤獨園説第一卷明觀自在菩薩現光瑞相入大地獄救度有情第二卷明觀自在菩薩入金銀地中示八聖道後證六字大明獲㧾持門令諸有情斷貪瞋等第三卷明佛為除蓋鄣菩薩廣説觀自在菩薩諸三摩地第四卷明六字大明有大勝力若受持者速獲悉地此揔意者先顯觀音之神力具彰利益之悲心除蓋鄣伸請於前薄伽梵廣明於後宣六字之呪句增益法成現三密之靈通悉地行滿揔而言之即祕密神通不思議之用也上一部中天竺梵本所出右經三藏沙門天息災譯法天證梵義施護證梵文沙門清沼常謹筆受沙門法進綴文沙門惠溫守巒道真置顯慧超慧達可瓌等證義沙門法雲智遜善祐校勘光祿卿湯悅兵部員外郎張洎潤文殿直劉素監譯是月十五日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣天息災等言臣等今譯就大乘莊嚴寶王經一部四卷伏以此經理契上根文詮妙義莊嚴表德祕密為宗究其道也滅迹匿端體其名也入流亡所慈心爰啓乃咨善逝之尊悲願聿興遂見普門之力廣設方便以趣菩提惟妙教之傳通賴聖朝之顯發伏惟應運統天睿文英武大聖至明廣孝皇帝陛下尊齊釋梵道邁羲農多能彰天縱之才十善運神明之化探微言於鷲嶺廣真誥於龍宮臣等德謝騰蘭才非奘什臨玉華之法席譯貝簡之至言契幸彌深覃研備至庶假貫花之了義仰資拂石之鴻圖前件新譯經謹繕寫上進以聞是日命坐賜茶親加撫慰仍賜束帛詔以其經入藏頒行是年七月譯成經五卷大方廣揔特寶光明經一部五卷大乘經藏祕密部收佛在王舍城鷲峯山説第一卷明佛言法界猶如虛空無其處所亦無住著乃至普賢説二字法門法慧問十住等行第二卷明地搖六震天雨衆華現此殊徵大衆雲集將宣寶光明揔持法門之因起也第三卷明信毀此經各招何報信奉者證菩提果毀謗者為地獄因第四卷明結偈揔彰廣説大乘無量之法諸行相等第五卷明時諸天人民皆唱是言此寶光明衆經中王佛令阿難依教奉行此揔意者以教理昭明義旨深邃是如來之密説契菩薩之上機不可具宣祕中之祕也上一部中天竺梵本所出右經三藏沙門法天譯天息災證梵義施護證梵文沙門清沼筆受沙門常謹綴文沙門建盛參詳沙門惠溫守巒道真置顯智遜法雲慧超可瓌慧達善祐等證義光祿卿湯悅兵部員外郎張洎潤文殿頭高品王文壽殿直劉素監譯是月十二日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣法天等言臣等今譯就大方廣揔持寶光明經一部五卷伏以此經專談實相允契上根當如來闢修證之要門普賢假法界而陳請由具德示寂常之至道吉祥詢妙觀以申誠原始要終窮理盡性綜一乘之奧義超十地之漸階大矣斯文貽於聖世伏惟應運統天睿文英武大聖至明廣孝皇帝陛下夙滋德本洞曉真乘受密記於雙林為外護於千界注懷鹿苑植福鸚林啓譯貝之勝因垂利生之善教臣等顧慙曩哲獲奉睿謀慶佛日之重光祝帝圖而彌永前件新譯經謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以其經入藏頒行天息災因奏曰臣等竊見教法東流歷朝翻譯宣傳佛語首在梵僧其如天竺中華方域懸阻或遇梵僧有闕則慮翻譯復停臣等欲乞下兩街僧司選諸寺院童子五十人就譯經院先令攻習梵字後令精窮梵義所貴成就梵學繼續翻宣上可之乃詔殿頭高品王文壽於左右街僧司集京城出家童子五百人以選之得惟淨等五十人是月左街僧録神曜引惟淨等見於崇政殿上令各誦所習經文仍諭以勵力勤習用副精選即日並送譯經院受學八月詔以譯經院為傳法院是年十月譯成經五卷守護大千國土經一部三卷大乘經藏祕密部收佛在鷲峯山南大樹林中説上卷所明大地震動毗邪離城一切人民悉皆恐怖世尊現瑞諸天來集佛説呪句持諸鬼魅衆生得免災害鬼神説偈歸佛中卷所明藥叉羅剎現醜惡形肆其貪毒殺害有情以四王呪力自縛而來然後世尊下靈鷲山入毗邪離現明王身説陀羅尼佛之密印下卷所明釋梵天等請佛世尊以是密印印於四方皆令頂受不敢違越此之揔意顯是呪明具諸功德能護大千國土普救無量衆生降毒藥叉伏惡羅剎原其大利修習持誦速證菩提斯乃大乘難思之教也大力明王經一部二卷大乘經藏祕密部收佛在母質鄰那山大寶樓閣中説上卷所明一切如來讚金剛手菩薩意顯持此明呪能伏冤對及諸惡毒下卷所明大力明王曼拏羅法依此而修速得成就此揔意者廣彰祕密降伏法門由降伏故息一切惡以息惡故即成增益其增益者增諸善法佛既明宣法有大力者也上二部並中天竺梵本所出右經二部五卷內一部二卷三藏沙門施護譯天息災法護證梵義法天證梵文一部二卷三藏沙門法護譯天息災證梵義法天施護證梵文沙門建盛筆受沙門常謹清沼綴文沙門惠溫守巒道真置顯智遜法雲慧超可瓌慧達善祐等證義光祿卿湯悅兵部員外郎張洎潤文殿頭高品王文壽殿直劉素監譯是月二日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣施護等言臣等今譯就守護大千國土經一部三卷大力明王經一部二卷並上乘真範奧典靈樞宣述大明彰示法印由如來祕密之藏皆世雄誠諦之言允屬文明式新翻譯伏惟應運統天睿文英武大聖至明廣孝皇帝陛下密修梵行洞究真宗揭慧炬以燭幽運慈航而濟物欽崇至教敷演一音警悟於羣迷用發揮於祕義臣等識非博達志切覃研參求華竺之言詳究苦空之諦今以繞樞叶慶浹壤蒙休仰資彌茂之皇齡允屬難思之妙教前件新譯經謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以其經入藏頒行是年詔許三藏沙門法護還天竺法護中天竺人也戒行精勤慧性明敏太平興國中與法天同屆京闕寓止譯筵以助翻演至是上表請還太宗特從其志是年詔賜證義沙門慧達紫衣雍熙元年三月譯成經六卷大乘善見變化文殊師利問法經一部一卷大乘經藏祕密部收佛在王舍城鷲峯山説此中所明諸煩惱性即善法性相而無相得而無得乃能成就最上涅槃樓閣正法甘露鼓經一部一卷大乘經藏祕密部收佛在舍衛國祇樹給孤獨園説初明建曼拏羅獲報優劣後説造舍利塔感果因緣以其造塔之功較量建壇之福依祕密修獲報勝也金耀童子經一部一卷大乘經藏收佛在舍衛國祇樹給孤獨園説此中所明金耀童子啓發大心修諸勝行遍歷僧祇方成極果廣明宿住記別等事較量壽命經一部一卷小乘經藏收佛在舍衛國祇樹給孤獨園説此中所明下從地獄上及人天三界之中壽命差別意令知已猒輪回苦欣寂滅樂也分別善惡報應經一部二卷小乘經藏收佛在舍衛國祇樹給孤獨園説上卷所明以商佉犬為發起緣廣談善惡之因各受好醜之報下卷所明補特伽羅命終之後生在人中又多愚暗乃至廣明修福各有十種等此揔意者欲令捨染趣淨慕聖出凡者也上五部並中天竺梵本所出右經三藏沙門天息災譯法天證梵義施護證梵文沙門清沼法定令遵筆受沙門常謹智遜慧達置顯綴文沙門惠溫守巒道真慧超法雲可瓌善祐等證義兵部員外郎張洎潤文殿頭高品王文壽殿直劉素監譯是月五日監使引三藏等詣崇政殿捧所譯經具表上進其詞曰臣天息災等言臣等今譯就大乘善見變化文殊師利問法經樓閣正法甘露鼓經金耀童子經較量壽命經分別善惡報應經等五部六卷或應大根演圓音於王舍或提小葉設權教於祇園稱讚菩提顯無為之至要較量壽命開有作之微因隨根器以闡揚應機緣而啓發實能仁之至教啓像劫之信心伏惟應運統天睿文英武大聖至明廣孝皇帝陛下德合上穹志尊竺典御金輪而獨耀興貝譯以惟新思廣利於四生用普臻於衆善供惟寶偈永祚皇圖殖福多於塵沙論壽彌於芥石永隆道化大庇黎元前件新譯經謹繕寫上進以聞是日命坐賜茶親加撫慰錫賜如例詔以其經入藏頒行是年詔賜筆受沙門法定令遵證義沙門可瓌等三人紫衣
